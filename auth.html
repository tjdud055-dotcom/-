<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>로그인 — 교환독서</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-sm" style="padding-top:60px">
  <div class="text-center mb-6">
    <a href="index.html" class="font-serif" style="font-size:22px;font-weight:600;color:var(--text);text-decoration:none">교환독서</a>
  </div>

  <div id="no-supabase" class="card hidden text-center" style="padding:32px 24px">
    <p style="font-size:32px;margin-bottom:12px">⚙️</p>
    <p class="font-semi mb-2">Supabase 설정이 필요해요</p>
    <p class="text-sm text-mid mb-4">로그인을 사용하려면 먼저 Supabase 프로젝트를 연결해주세요.</p>
    <a href="settings.html" class="btn btn-primary btn-sm">설정하러 가기</a>
  </div>

  <div id="auth-card" class="card hidden">
    <div style="display:flex;background:var(--cream);border-radius:10px;padding:4px;margin-bottom:24px">
      <button class="tab-btn active" data-mode="login" style="flex:1;padding:8px;border:none;border-radius:8px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.08);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s">로그인</button>
      <button class="tab-btn" data-mode="signup" style="flex:1;padding:8px;border:none;border-radius:8px;background:transparent;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--text-lt)">회원가입</button>
    </div>

    <div id="msg" class="hidden mb-4 text-sm"></div>

    <!-- 로그인 / 회원가입 폼 -->
    <form id="auth-form" class="fields">
      <div id="username-field" class="field hidden">
        <label class="label">닉네임</label>
        <input id="username" class="input" type="text" placeholder="구절에 표시될 이름" minlength="2" maxlength="20">
      </div>
      <div class="field">
        <label class="label">이메일</label>
        <input id="email" class="input" type="email" placeholder="email@example.com" required>
      </div>
      <div class="field">
        <label class="label">비밀번호</label>
        <input id="password" class="input" type="password" placeholder="6자 이상" required minlength="6">
      </div>
      <button type="submit" id="auth-btn" class="btn btn-primary btn-block">로그인</button>
      <div id="forgot-wrap" class="text-center" style="margin-top:-4px">
        <button type="button" onclick="showForgot()" class="text-xs text-lt" style="background:none;border:none;cursor:pointer;text-decoration:underline">비밀번호를 잊으셨나요?</button>
      </div>
    </form>

    <!-- 비밀번호 재설정 -->
    <div id="forgot-panel" class="hidden">
      <p class="font-semi mb-1">비밀번호 재설정</p>
      <p class="text-sm text-mid mb-4">가입한 이메일을 입력하면 재설정 링크를 보내드려요.</p>
      <div id="forgot-msg" class="hidden mb-3 text-sm"></div>
      <div class="fields">
        <div class="field">
          <label class="label">이메일</label>
          <input id="reset-email" class="input" type="email" placeholder="email@example.com">
        </div>
        <button onclick="sendResetEmail()" id="reset-btn" class="btn btn-primary btn-block">재설정 이메일 보내기</button>
        <button type="button" onclick="showLogin()" class="text-xs text-lt text-center" style="background:none;border:none;cursor:pointer;text-decoration:underline">← 로그인으로 돌아가기</button>
      </div>
    </div>

    <!-- 새 비밀번호 설정 (재설정 링크 클릭 후) -->
    <div id="reset-panel" class="hidden">
      <p class="font-semi mb-1">새 비밀번호 설정</p>
      <p class="text-sm text-mid mb-4">새로 사용할 비밀번호를 입력해주세요.</p>
      <div id="reset-msg" class="hidden mb-3 text-sm"></div>
      <div class="fields">
        <div class="field">
          <label class="label">새 비밀번호</label>
          <input id="new-password" class="input" type="password" placeholder="6자 이상" minlength="6">
        </div>
        <button onclick="updatePassword()" id="update-btn" class="btn btn-primary btn-block">비밀번호 변경</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/app.js"></script>
<script>
let mode = 'login'
let sb = null

function initSB() {
  const url = DB.getSupabaseUrl() || _paramFromURL('sburl')
  const key = DB.getSupabaseKey() || _paramFromURL('sbkey')
  if (!url || !key) return null
  if (url && key && !DB.getSupabaseUrl()) DB.setSupabase(url, key)
  return window.supabase.createClient(url, key)
}

function setMsg(text, type) {
  const el = document.getElementById('msg')
  el.textContent = text
  el.className = text ? `alert alert-${type} mb-4 text-sm` : 'hidden'
}

;(async () => {
  sb = initSB()

  if (!sb) {
    document.getElementById('no-supabase').classList.remove('hidden')
    return
  }

  document.getElementById('auth-card').classList.remove('hidden')

  // 비밀번호 재설정 링크로 진입한 경우 (URL 해시에 type=recovery)
  const hash = Object.fromEntries(new URLSearchParams(location.hash.slice(1)))
  if (hash.type === 'recovery' && hash.access_token) {
    await sb.auth.setSession({ access_token: hash.access_token, refresh_token: hash.refresh_token || '' })
    showPanel('reset-panel')
    history.replaceState(null, '', location.pathname + location.search)
    return
  }

  // 이미 로그인된 경우
  const { data: { session } } = await sb.auth.getSession()
  if (session) {
    const meta = session.user.user_metadata
    DB.setMe({ name: meta.username || meta.name || session.user.email.split('@')[0], email: session.user.email, userId: session.user.id, bio: meta.bio || '', profileColor: meta.profileColor || '' })
    location.replace('dashboard.html')
    return
  }
})()

function showPanel(id) {
  ;['auth-form', 'forgot-panel', 'reset-panel'].forEach(p =>
    document.getElementById(p).classList.toggle('hidden', p !== id)
  )
  setMsg('', '')
}
function showForgot() {
  document.getElementById('forgot-msg').className = 'hidden'
  document.getElementById('reset-email').value = document.getElementById('email').value
  showPanel('forgot-panel')
}
function showLogin() { showPanel('auth-form') }

async function sendResetEmail() {
  const email = document.getElementById('reset-email').value.trim()
  const msgEl = document.getElementById('forgot-msg')
  const btn = document.getElementById('reset-btn')
  if (!email) { msgEl.textContent = '이메일을 입력해주세요.'; msgEl.className = 'alert alert-pink mb-3 text-sm'; return }
  btn.disabled = true; btn.textContent = '전송 중...'
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: location.origin + location.pathname.replace(/[^/]*$/, '') + 'auth.html'
  })
  btn.disabled = false; btn.textContent = '재설정 이메일 보내기'
  if (error) {
    msgEl.textContent = '전송 실패: ' + error.message
    msgEl.className = 'alert alert-pink mb-3 text-sm'
  } else {
    msgEl.textContent = '📩 재설정 링크를 이메일로 보냈어요. 메일함을 확인해주세요.'
    msgEl.className = 'alert alert-green mb-3 text-sm'
  }
}

async function updatePassword() {
  const pw = document.getElementById('new-password').value
  const msgEl = document.getElementById('reset-msg')
  const btn = document.getElementById('update-btn')
  if (pw.length < 6) { msgEl.textContent = '비밀번호는 6자 이상이어야 해요.'; msgEl.className = 'alert alert-pink mb-3 text-sm'; return }
  btn.disabled = true; btn.textContent = '변경 중...'
  const { error } = await sb.auth.updateUser({ password: pw })
  btn.disabled = false; btn.textContent = '비밀번호 변경'
  if (error) {
    msgEl.textContent = '변경 실패: ' + error.message
    msgEl.className = 'alert alert-pink mb-3 text-sm'
  } else {
    msgEl.textContent = '✓ 비밀번호가 변경됐어요!'
    msgEl.className = 'alert alert-green mb-3 text-sm'
    setTimeout(() => location.replace('dashboard.html'), 1500)
  }
}

// 탭 전환
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.mode
    document.querySelectorAll('.tab-btn').forEach(b => {
      const active = b === btn
      b.style.background = active ? '#fff' : 'transparent'
      b.style.color = active ? 'var(--text)' : 'var(--text-lt)'
      b.style.boxShadow = active ? '0 1px 4px rgba(0,0,0,.08)' : 'none'
    })
    document.getElementById('username-field').classList.toggle('hidden', mode !== 'signup')
    document.getElementById('username').required = mode === 'signup'
    document.getElementById('auth-btn').textContent = mode === 'login' ? '로그인' : '가입하기'
    document.getElementById('forgot-wrap').classList.toggle('hidden', mode !== 'login')
    showPanel('auth-form')
    setMsg('', '')
  })
})

document.getElementById('auth-form').addEventListener('submit', async e => {
  e.preventDefault()
  if (!sb) return

  const btn = document.getElementById('auth-btn')
  btn.disabled = true; btn.textContent = '처리 중...'
  setMsg('', '')

  const email    = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value
  const username = document.getElementById('username').value.trim()

  if (mode === 'signup') {
    if (!username) { setMsg('닉네임을 입력해주세요.', 'pink'); btn.disabled = false; btn.textContent = '가입하기'; return }
    const { data, error } = await sb.auth.signUp({
      email, password,
      options: { data: { username } }
    })
    if (error) {
      const map = {
        'User already registered': '이미 가입된 이메일이에요. 로그인해주세요.',
        'Password should be at least 6 characters': '비밀번호는 6자 이상이어야 해요.',
      }
      setMsg(map[error.message] || '가입 실패: ' + error.message, 'pink')
    } else if (data.session) {
      DB.setMe({ name: username, email, userId: data.user.id })
      const next = _paramFromURL('next')
      location.replace(next ? decodeURIComponent(next) : 'onboarding.html')
    } else {
      setMsg('📩 가입 확인 이메일을 보냈어요. 메일함을 확인해주세요.', 'green')
    }
  } else {
    const { data, error } = await sb.auth.signInWithPassword({ email, password })
    if (error) {
      setMsg('이메일 또는 비밀번호가 올바르지 않습니다.', 'pink')
    } else {
      const meta = data.user.user_metadata
      const name = meta.username || meta.name || email.split('@')[0]
      DB.setMe({ name, email, userId: data.user.id, bio: meta.bio || '', profileColor: meta.profileColor || '' })
      const next = _paramFromURL('next')
      location.replace(next ? decodeURIComponent(next) : 'dashboard.html')
    }
  }

  btn.disabled = false
  btn.textContent = mode === 'login' ? '로그인' : '가입하기'
})
</script>
</body></html>
