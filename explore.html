<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>공개 그룹 탐색 — 교환독서</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="nav"><div class="nav-inner"></div></nav>
<div class="page">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="font-serif" style="font-size:22px;font-weight:600">공개 그룹 탐색</h1>
      <p class="text-sm text-mid mt-1">지금 모집 중인 독서 그룹에 참여해보세요.</p>
    </div>
    <a href="new-group.html" class="btn btn-primary">+ 그룹 만들기</a>
  </div>
  <div id="loading" class="spinner"></div>
  <div id="list" class="grid-3 hidden"></div>
  <div id="empty" class="empty hidden">
    <div class="empty-icon">🔍</div>
    <p>현재 모집 중인 공개 그룹이 없어요.</p>
    <a href="new-group.html" class="btn btn-primary btn-sm mt-4">첫 그룹을 만들어보세요</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
<script>
const sb = getSB();

(async () => {
  const user = await getUser();
  renderNav('explore');

  const { data: groups } = await sb.from('groups')
    .select('*, books(*), group_members(user_id, has_completed)')
    .eq('is_public', true).eq('status', 'reading')
    .order('created_at', { ascending: false }).limit(40);

  const available = (groups ?? []).filter(g =>
    g.group_members.length < g.max_members &&
    !g.group_members.some(m => m.user_id === user?.id)
  );

  document.getElementById('loading').classList.add('hidden');

  if (!available.length) {
    document.getElementById('empty').classList.remove('hidden'); return;
  }

  const list = document.getElementById('list');
  list.classList.remove('hidden');
  list.innerHTML = available.map(g => {
    const dl  = daysLeft(g.deadline);
    const cnt = g.group_members.length;
    return `
      <a href="invite.html?code=${g.invite_code}" style="text-decoration:none">
        <div class="card" style="height:100%;display:flex;flex-direction:column;gap:14px;transition:all .15s;cursor:pointer" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 24px rgba(61,53,48,.1)'" onmouseout="this.style.transform='';this.style.boxShadow=''">
          <div class="flex gap-3 items-start">
            ${bookCoverHTML(g.books.cover_url, g.books.title)}
            <div class="min-w-0 flex-1">
              <p class="font-semi truncate">${g.name}</p>
              <p class="text-xs text-mid truncate mt-1">${g.books.title}</p>
              <p class="text-xs text-lt">${g.books.author}</p>
            </div>
          </div>
          ${g.description ? `<p class="text-sm text-mid" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${g.description}</p>` : ''}
          <div class="flex justify-between text-xs text-lt mt-auto">
            <span>👥 ${cnt}/${g.max_members}명</span>
            <span ${dl <= 3 && dl >= 0 ? 'style="color:#e87070;font-weight:500"' : ''}>D-${dl > 0 ? dl : '기한초과'}</span>
          </div>
          <span class="btn btn-sm btn-primary" style="text-align:center">참여하기 →</span>
        </div>
      </a>`;
  }).join('');
})();
</script>
</body></html>
