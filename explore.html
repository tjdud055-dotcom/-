<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>공개 그룹 탐색 — 교환독서</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="nav"><div class="nav-inner"></div></nav>
<div class="page">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="font-serif" style="font-size:22px;font-weight:600">공개 그룹 탐색</h1>
      <p class="text-sm text-mid mt-1">지금 모집 중인 독서 그룹에 참여해보세요.</p>
    </div>
    <a href="new-group.html" class="btn btn-primary">+ 그룹 만들기</a>
  </div>

  <div id="no-sb" class="card hidden text-center" style="padding:40px 24px">
    <p style="font-size:36px;margin-bottom:12px">⚙️</p>
    <p class="font-semi mb-2">Supabase 설정이 필요해요</p>
    <p class="text-sm text-mid mb-4">공개 그룹을 보려면 먼저 Supabase 프로젝트를 연결해주세요.</p>
    <a href="settings.html" class="btn btn-primary btn-sm">설정하러 가기</a>
  </div>

  <div id="loading" class="spinner hidden"></div>

  <div id="list" class="grid-2 hidden"></div>

  <div id="empty" class="empty hidden">
    <div class="empty-icon">🔍</div>
    <p class="mb-4">현재 모집 중인 공개 그룹이 없어요.</p>
    <a href="new-group.html" class="btn btn-primary btn-sm">첫 그룹을 만들어보세요</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/app.js"></script>
<script>
const me = requireProfile(); if (!me) throw 0
renderNav('explore')

;(async () => {
  const sbUrl = DB.getSupabaseUrl()
  const sbKey = DB.getSupabaseKey()

  if (!sbUrl || !sbKey) {
    document.getElementById('no-sb').classList.remove('hidden')
    return
  }

  document.getElementById('loading').classList.remove('hidden')

  const sb = window.supabase.createClient(sbUrl, sbKey)
  const { data, error } = await sb
    .from('gd_groups')
    .select('id, data')
    .filter('data->>isPublic', 'eq', 'true')
    .filter('data->>status', 'eq', 'reading')
    .order('updated_at', { ascending: false })
    .limit(40)

  document.getElementById('loading').classList.add('hidden')

  if (error) {
    document.getElementById('empty').classList.remove('hidden')
    toast('그룹 목록을 불러오지 못했어요: ' + error.message)
    return
  }

  // 내가 이미 참여 중인 그룹 제외, 정원 마감 제외
  const myGroups = new Set(DB.getGroups().map(g => g.id))
  const available = (data || [])
    .map(row => row.data)
    .filter(g => g && !myGroups.has(g.id) && g.members.length < (g.maxMembers || 8))

  if (!available.length) {
    document.getElementById('empty').classList.remove('hidden')
    return
  }

  const list = document.getElementById('list')
  list.classList.remove('hidden')
  list.innerHTML = available.map(g => {
    const dl  = daysLeft(g.deadline)
    const cnt = g.members.length
    const max = g.maxMembers || 8
    return `
      <a href="invite.html?id=${g.id}" style="text-decoration:none">
        <div class="card" style="height:100%;display:flex;flex-direction:column;gap:14px;transition:all .15s;cursor:pointer"
          onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 24px rgba(61,53,48,.1)'"
          onmouseout="this.style.transform='';this.style.boxShadow=''">
          <div style="height:5px;background:${g.coverColor||'#B8D4E8'};border-radius:12px 12px 0 0;margin:-24px -24px 8px;flex-shrink:0"></div>
          <div class="flex gap-3 items-start">
            ${bookCoverHTML(g.book?.cover_url, g.book?.title)}
            <div class="min-w-0 flex-1">
              <p class="font-semi truncate">${g.name}</p>
              <p class="text-xs text-mid truncate mt-1">${g.book?.title}</p>
              <p class="text-xs text-lt">${g.book?.author}</p>
            </div>
          </div>
          ${g.description ? `<p class="text-sm text-mid" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${g.description}</p>` : ''}
          <div class="flex justify-between text-xs text-lt mt-auto">
            <span>👥 ${cnt}/${max}명</span>
            <span ${dl<=3&&dl>=0?'style="color:#e87070;font-weight:500"':''}>D-${dl>0?dl:dl===0?'오늘':'기한초과'}</span>
          </div>
          <div class="btn btn-primary btn-sm" style="text-align:center">참여하기 →</div>
        </div>
      </a>`
  }).join('')
})()
</script>
</body></html>
